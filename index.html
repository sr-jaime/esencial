<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESENCIAL</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0F0C08;
      --beige: #F5EDE4;
      --accent: #E8C9A0;
      --glow: 0 0 20px rgba(232, 201, 160, 0.6);
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--beige);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(212, 184, 159, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(232, 201, 160, 0.06) 0%, transparent 50%);
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 60px;
    }

    /* Header */
    header {
      text-align: center;
      position: relative;
    }

    .orb-container {
      position: relative;
      height: 200px;
      width: 200px;
      margin: 0 auto 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(232,201,160,0.9), rgba(184,154,122,0.4));
      box-shadow: 0 0 60px rgba(232, 201, 160, 0.8), 0 0 120px rgba(232, 201, 160, 0.4);
      animation: pulseOrb 8s ease-in-out infinite;
    }

    .orb1 { width: 200px; height: 200px; }
    .orb2 { width: 90px; height: 90px; top: 55px; left: 25%; animation-delay: -3s; }
    .orb3 { width: 70px; height: 70px; top: 80px; right: 20%; animation-delay: -5s; }

    @keyframes pulseOrb {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.5rem, 12vw, 5.5rem);
      font-weight: 700;
      color: var(--beige);
      text-shadow: 0 0 40px rgba(232,201,160,0.95), 0 0 80px rgba(232,201,160,0.5);
      letter-spacing: -0.02em;
      animation: floatTitle 6s ease-in-out infinite;
      margin-bottom: 20px;
    }

    @keyframes floatTitle {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }

    .subtitle {
      font-size: clamp(1rem, 3vw, 1.3rem);
      color: rgba(245, 237, 228, 0.8);
      font-weight: 300;
      letter-spacing: 1px;
      animation: fadeInUp 1s ease-out 0.3s backwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Buttons Section */
    .buttons-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      width: 100%;
      max-width: 600px;
    }

    .btn-card {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      padding: 48px 32px;
      text-decoration: none;
      cursor: pointer;
      border: 2px solid;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 16px;
      animation: slideIn 0.6s ease-out backwards;
    }

    .btn-card:nth-child(1) { animation-delay: 0.3s; border-color: #4A90E2; }
    .btn-card:nth-child(2) { animation-delay: 0.5s; border-color: #27AE60; }

    .btn-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.1), transparent);
      opacity: 0;
      transition: opacity 0.4s;
    }

    .btn-card:hover::before {
      opacity: 1;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .btn-card:nth-child(2) {
      animation-name: slideInReverse;
    }

    @keyframes slideInReverse {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .btn-icon {
      font-size: 48px;
      animation: float 3s ease-in-out infinite;
    }

    .btn-card:nth-child(2) .btn-icon {
      animation-delay: -1.5s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }

    .btn-text {
      font-size: clamp(1.2rem, 4vw, 1.6rem);
      font-weight: 600;
      color: var(--beige);
      letter-spacing: 1px;
    }

    .btn-description {
      font-size: 14px;
      color: rgba(245, 237, 228, 0.7);
      font-weight: 300;
    }

    .btn-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.55), var(--glow);
      border-color: var(--accent);
    }

    .btn-card:active {
      transform: translateY(-4px);
    }

    /* Info Section */
    .info-section {
      text-align: center;
      color: rgba(245, 237, 228, 0.6);
      font-size: 14px;
      line-height: 1.8;
      max-width: 500px;
      animation: fadeInUp 1s ease-out 0.7s backwards;
    }

    .info-section p {
      margin-bottom: 12px;
    }

    /* ── HELP ORB ── */
    .help-orb {
      position: fixed;
      top: 24px;
      right: 24px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      background: radial-gradient(circle at 35% 30%, rgba(100, 180, 255, 0.95), rgba(30, 100, 220, 0.7));
      box-shadow: 0 0 18px rgba(80, 160, 255, 0.9), 0 0 40px rgba(60, 130, 255, 0.5);
      animation: blinkOrb 2s ease-in-out infinite;
      border: 2px solid rgba(160, 210, 255, 0.6);
      transition: transform 0.2s ease;
      user-select: none;
    }

    .help-orb:hover {
      transform: scale(1.12);
    }

    .help-orb:active {
      transform: scale(0.95);
    }

    .help-orb span {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
      text-shadow: 0 0 12px rgba(255,255,255,0.8);
      pointer-events: none;
    }

    @keyframes blinkOrb {
      0%, 100% {
        box-shadow: 0 0 18px rgba(80, 160, 255, 0.9), 0 0 40px rgba(60, 130, 255, 0.5);
        opacity: 1;
      }
      50% {
        box-shadow: 0 0 6px rgba(80, 160, 255, 0.3), 0 0 14px rgba(60, 130, 255, 0.15);
        opacity: 0.65;
      }
    }

    /* ── VIDEO OVERLAY ── */
    .video-overlay {
      display: flex;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 99999;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.9s ease;
    }

    .video-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .video-overlay.fading {
      opacity: 0;
      pointer-events: none;
    }

    .video-overlay video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .video-close {
      position: absolute;
      top: 18px;
      right: 22px;
      background: rgba(255, 0, 0, 0.15);
      border: none;
      color: #fff;
      font-size: 28px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100000;
      transition: background 0.2s;
      line-height: 1;
    }

    .video-close:hover {
      background: rgba(255, 0, 0, 0.8);
    }

    /* Responsive */
    @media (max-width: 640px) {
      .buttons-section {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .container {
        gap: 40px;
      }

      h1 {
        font-size: 2.8rem;
      }

      .help-orb {
        top: 16px;
        right: 16px;
        width: 44px;
        height: 44px;
      }

      .help-orb span {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <!-- HELP ORB -->
  <div class="help-orb" id="helpOrb" title="¿Qué es ESENCIAL?">
    <span>?</span>
  </div>

  <!-- VIDEO OVERLAY -->
  <div class="video-overlay" id="videoOverlay">
    <button class="video-close" id="videoClose" title="Cerrar">&#x2715;</button>
    <video id="helpVideo" playsinline>
      <!-- Reemplaza el src con la ruta real de tu video -->
      <source src="QUIO.mp4" type="video/mp4">
    </video>
  </div>

  <div class="container">
    <header>
      <div class="orb-container">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
      </div>
      <h1>ESENCIAL</h1>
    </header>

    <section class="buttons-section">
      <a href="proyecto.html" class="btn-card">
        <span class="btn-icon">🎵</span>
        <span class="btn-text">PROYECTO</span>
        <span class="btn-description">Descubre qué es ESENCIAL</span>
      </a>

      <a href="compartir.html" class="btn-card">
        <span class="btn-icon">🎙️</span>
        <span class="btn-text">COMPARTIR</span>
        <span class="btn-description">Se parte de este proyecto</span>
      </a>
    </section>

    <section class="info-section">
      <p style="font-size: 12px; margin-top: 20px;">© 2026 ESENCIAL | Todos los derechos reservados | Sr Jaime</p>
    </section>
  </div>

  <script>
    const helpOrb = document.getElementById('helpOrb');
    const videoOverlay = document.getElementById('videoOverlay');
    const helpVideo = document.getElementById('helpVideo');
    const videoClose = document.getElementById('videoClose');

    function openVideo() {
      videoOverlay.classList.add('active');
      helpVideo.currentTime = 0;
      helpVideo.play().catch(() => {});
    }

    function closeVideo() {
      videoOverlay.classList.add('fading');
      videoOverlay.classList.remove('active');
      setTimeout(() => {
        helpVideo.pause();
        helpVideo.currentTime = 0;
        videoOverlay.classList.remove('fading');
      }, 900);
    }

    helpOrb.addEventListener('click', openVideo);
    videoClose.addEventListener('click', closeVideo);

    helpVideo.addEventListener('ended', closeVideo);

    videoOverlay.addEventListener('click', function(e) {
      if (e.target === videoOverlay) closeVideo();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeVideo();
    });
  </script>

</body>
</html>
