<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESENCIAL</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    :root {
      --bg: #0F0C08;
      --beige: #F5EDE4;
      --light-brown: #D4B89F;
      --warm-brown: #B89A7A;
      --accent: #E8C9A0;
      --text: #F5EDE4;
      --muted: #A38A6F;
      --glow: 0 0 20px rgba(232, 201, 160, 0.6);
      --radius: 28px;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 100px;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(212, 184, 159, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(232, 201, 160, 0.06) 0%, transparent 50%);
      overflow-x: hidden;
    }

    /* ==================== HEADER ESENCIAL ANIMADO ==================== */
    header {
      width: 100%;
      max-width: 680px;
      text-align: center;
      margin-bottom: 60px;
      position: relative;
    }

    .header-container {
      position: relative;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(232,201,160,0.9), rgba(184,154,122,0.4));
      box-shadow: 
        0 0 60px rgba(232, 201, 160, 0.8),
        0 0 120px rgba(232, 201, 160, 0.4),
        inset 0 0 40px rgba(255,255,255,0.6);
      animation: pulseOrb 8s ease-in-out infinite;
    }

    .orb1 { width: 140px; height: 140px; top: 20px; left: 50%; transform: translateX(-50%); }
    .orb2 { width: 80px; height: 80px; top: 40px; left: 30%; animation-delay: -3s; opacity: 0.7; }
    .orb3 { width: 60px; height: 60px; top: 70px; right: 25%; animation-delay: -5s; }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: rgba(212, 184, 159, 0.18);
      color: var(--light-brown);
      font-weight: 600;
      font-size: 14px;
      letter-spacing: .2em;
      text-transform: uppercase;
      padding: 10px 28px;
      border-radius: 100px;
      margin-bottom: 16px;
      border: 1px solid rgba(232, 201, 160, 0.35);
      box-shadow: var(--glow);
      position: relative;
      z-index: 2;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 8.5vw, 4.2rem);
      font-weight: 700;
      line-height: 1.05;
      color: var(--beige);
      text-shadow: 
        0 0 20px rgba(232,201,160,0.9),
        0 0 40px rgba(232,201,160,0.5);
      margin-bottom: 8px;
      position: relative;
      z-index: 2;
    }

    .subtitle {
      font-size: 16px;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.8px;
      position: relative;
      z-index: 2;
    }

    @keyframes pulseOrb {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.08); }
    }

    /* ==================== QUESTION CARDS ==================== */
    .main-container {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .question-card {
      background: rgba(20, 17, 13, 0.92);
      border: 1px solid rgba(212, 184, 159, 0.3);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .question-card:hover {
      border-color: var(--accent);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), var(--glow);
      transform: translateY(-6px);
    }

    .question-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.7;
    }

    .question-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: rgba(232, 201, 160, 0.12);
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
      border-radius: 50%;
      margin-bottom: 16px;
      border: 1px solid rgba(232, 201, 160, 0.4);
    }

    .question-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.25rem, 4.5vw, 1.55rem);
      line-height: 1.35;
      color: var(--beige);
      margin-bottom: 28px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    }

    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .btn {
      padding: 16px 20px;
      border-radius: 50px;
      font-weight: 500;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 1px solid transparent;
      box-shadow: var(--glow);
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: translateX(-150%);
      transition: transform 0.6s;
    }

    .btn:hover::after {
      transform: translateX(300%);
    }

    .btn-upload {
      background: rgba(212, 184, 159, 0.15);
      color: var(--beige);
      border-color: var(--light-brown);
    }

    .btn-record {
      background: rgba(184, 154, 122, 0.22);
      color: var(--accent);
      border-color: var(--warm-brown);
    }

    .btn-recording {
      background: #9C2A2A;
      color: white;
      animation: pulseRecording 1.5s infinite;
    }

    .btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 25px rgba(232, 201, 160, 0.8);
    }

    @keyframes pulseRecording {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.75; }
    }

    .assigned-audio {
      margin-top: 20px;
      padding: 16px;
      background: rgba(245, 237, 228, 0.09);
      border-radius: 18px;
      font-size: 14px;
      color: var(--light-brown);
      display: none;
      align-items: center;
      gap: 12px;
      border: 1px solid rgba(212,184,159,0.2);
    }

    /* Toast y Share */
    #shareBtn {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, var(--accent), var(--light-brown));
      color: #0F0C08;
      font-weight: 600;
      padding: 16px 52px;
      border-radius: 50px;
      font-size: 15.5px;
      box-shadow: 0 10px 30px rgba(232, 201, 160, 0.5);
      display: none;
      z-index: 100;
      white-space: nowrap;
      transition: all 0.3s ease;
    }

    #shareBtn:hover {
      transform: translateX(-50%) translateY(-4px);
      box-shadow: 0 15px 35px rgba(232, 201, 160, 0.7);
    }

    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20,17,13,0.96);
      color: var(--beige);
      border: 1px solid var(--accent);
      padding: 14px 32px;
      border-radius: 50px;
      box-shadow: var(--glow);
      opacity: 0;
      transition: all 0.4s ease;
      z-index: 200;
    }

    .toast.show { 
      opacity: 1; 
      transform: translateX(-50%) translateY(-12px); 
    }
  </style>
</head>
<body>

  <header>
    <div class="header-container">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>
      
      <div>
        <div class="logo-badge">🌾 ESENCIAL</div>
        <h1>Guarda lo que más importa</h1>
        <p class="subtitle">Cuatro sonidos. Cuatro recuerdos. Tu esencia.</p>
      </div>
    </div>
  </header>

  <div class="main-container">

    <!-- Pregunta 1 -->
    <div class="question-card" data-slot="1">
      <div class="question-number">01</div>
      <p class="question-text">Un sonido de tu infancia que nunca olvidaste</p>
      <div class="action-buttons">
        <button class="btn btn-upload" onclick="triggerUpload(1)">📁 Subir archivo</button>
        <button class="btn btn-record" id="recordBtn1" onclick="toggleRecording(1)">🎤 Grabar ahora</button>
      </div>
      <div class="assigned-audio" id="audio1">
        <span>🎵</span>
        <span id="name1"></span>
      </div>
    </div>

    <!-- Pregunta 2 -->
    <div class="question-card" data-slot="2">
      <div class="question-number">02</div>
      <p class="question-text">La voz de alguien que marcó tu vida</p>
      <div class="action-buttons">
        <button class="btn btn-upload" onclick="triggerUpload(2)">📁 Subir archivo</button>
        <button class="btn btn-record" id="recordBtn2" onclick="toggleRecording(2)">🎤 Grabar ahora</button>
      </div>
      <div class="assigned-audio" id="audio2">
        <span>🎵</span>
        <span id="name2"></span>
      </div>
    </div>

    <!-- Pregunta 3 -->
    <div class="question-card" data-slot="3">
      <div class="question-number">03</div>
      <p class="question-text">Un momento de paz o tranquilidad</p>
      <div class="action-buttons">
        <button class="btn btn-upload" onclick="triggerUpload(3)">📁 Subir archivo</button>
        <button class="btn btn-record" id="recordBtn3" onclick="toggleRecording(3)">🎤 Grabar ahora</button>
      </div>
      <div class="assigned-audio" id="audio3">
        <span>🎵</span>
        <span id="name3"></span>
      </div>
    </div>

    <!-- Pregunta 4 -->
    <div class="question-card" data-slot="4">
      <div class="question-number">04</div>
      <p class="question-text">El sonido que te define hoy</p>
      <div class="action-buttons">
        <button class="btn btn-upload" onclick="triggerUpload(4)">📁 Subir archivo</button>
        <button class="btn btn-record" id="recordBtn4" onclick="toggleRecording(4)">🎤 Grabar ahora</button>
      </div>
      <div class="assigned-audio" id="audio4">
        <span>🎵</span>
        <span id="name4"></span>
      </div>
    </div>

  </div>

  <button id="shareBtn" onclick="shareCollection()">Compartir mi Esencial</button>
  <div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = "https://jxdtrqowhjayvybjrghb.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4ZHRycW93aGpheXZ5YmpyZ2hiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjkzNDgsImV4cCI6MjA5MDA0NTM0OH0.Yzn4QEIluAFgtkevEy3qvpNMGSqfnIkLjBiuR3iu-YQ";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let selectedFiles = {};
  let audioCount = 0;
  let mediaRecorder;
  let audioChunks = [];
  let currentSlot = null;
  let isRecording = false;
  let stream = null;

  // Trigger upload
  function triggerUpload(slot) {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'audio/*';
    input.onchange = () => {
      const file = input.files[0];
      if (file) assignAudio(slot, file);
    };
    input.click();
  }

  function assignAudio(slot, file) {
    if (audioCount >= 4 && !selectedFiles[slot]) {
      showToast("Solo puedes tener 4 audios", true);
      return;
    }
    selectedFiles[slot] = file;
    if (!document.getElementById(`audio${slot}`).style.display || document.getElementById(`audio${slot}`).style.display === 'none') {
      audioCount++;
    }

    const audioDiv = document.getElementById(`audio${slot}`);
    audioDiv.style.display = 'flex';
    document.getElementById(`name${slot}`).textContent = file.name.length > 30 ? file.name.substring(0,27)+'...' : file.name;

    checkShareButton();
    showToast(`Audio asignado al recuerdo ${slot}`);
    uploadAudio(file, slot);
  }

  async function uploadAudio(file, slot) {
    try {
      const fileName = Date.now() + "-" + file.name;
      const { error } = await supabaseClient.storage.from('QUIO').upload(fileName, file);
      if (error) throw error;

      const { data: urlData } = supabaseClient.storage.from('QUIO').getPublicUrl(fileName);
      await supabaseClient.from('EZE').insert([{ Audio: urlData.publicUrl, slot: slot }]);
    } catch (e) {
      console.error(e);
      showToast("Error al subir el archivo", true);
    }
  }

  function checkShareButton() {
    document.getElementById('shareBtn').style.display = audioCount === 4 ? 'block' : 'none';
  }

  function shareCollection() {
    showToast("Enlace de compartir generado (simulado)");
  }

  // ==================== GRABACIÓN DE AUDIO ====================
  async function toggleRecording(slot) {
    const btn = document.getElementById(`recordBtn${slot}`);

    if (isRecording && currentSlot === slot) {
      stopRecording();
      return;
    }

    if (isRecording) {
      showToast("Ya estás grabando en otro slot", true);
      return;
    }

    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream);

      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        const file = new File([audioBlob], `grabacion_${slot}_${Date.now()}.webm`, { type: 'audio/webm' });
        assignAudio(slot, file);
        stream.getTracks().forEach(track => track.stop());
      };

      mediaRecorder.start();
      isRecording = true;
      currentSlot = slot;

      // UI
      btn.classList.add('btn-recording');
      btn.innerHTML = `⏹️ Detener grabación`;
      showToast("Grabando... (máximo recomendado 60s)");

    } catch (err) {
      console.error(err);
      showToast("No se pudo acceder al micrófono. Revisa los permisos.", true);
    }
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== "inactive") {
      mediaRecorder.stop();
    }
    isRecording = false;
    currentSlot = null;

    // Reset all record buttons
    for (let i = 1; i <= 4; i++) {
      const btn = document.getElementById(`recordBtn${i}`);
      if (btn) {
        btn.classList.remove('btn-recording');
        btn.innerHTML = `🎤 Grabar ahora`;
      }
    }
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.borderColor = isError ? '#C75B35' : 'var(--accent)';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3400);
  }

  // Cleanup on page unload
  window.addEventListener('beforeunload', () => {
    if (stream) stream.getTracks().forEach(track => track.stop());
  });

  // Load existing audios (placeholder)
  async function loadAudios() {
    console.log("Audios cargados desde Supabase");
  }

  loadAudios();
</script>
</body>
</html>
